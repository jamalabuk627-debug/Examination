  <style>
    body,
    html {
      margin: 0;
      overflow: hidden;
      font-family: 'Poppins', 'Segoe UI', sans-serif;
    }

    .hud {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 100;
      background: rgba(8, 20, 30, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 14px 22px;
      border-left: 4px solid #6af0ff;
      color: white;
      pointer-events: none;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      font-size: 0.9rem;
      max-width: 280px;
    }

    .hud h2 {
      margin: 0 0 6px;
      font-size: 1.2rem;
      letter-spacing: 1px;
      color: #aaf5ff;
    }

    .hud p {
      margin: 0;
      font-size: 0.8rem;
      opacity: 0.9;
    }

<body>
  <div class="hud">
    <h2>☀️ DREAM VILLA VR</h2>
    <p>🕹️ WASD to move | 🖱️ Mouse to look | 🏊 Jump into the pool!
    </p>
  </div>

  <!-- Procedural texture canvases for pool tiles & water caustic -->
  <canvas id="poolTileCanvas" width="512" height="512" style="display:none;"></canvas>
  <canvas id="waterCausticCanvas" width="512" height="512" style="display:none;"></canvas>

  <script>
    // ========== GENERATE HIGH-QUALITY POOL TILES & WATER TEXTURE ==========
    (function generateEnhancedTextures() {
      const tileCanvas = document.getElementById("poolTileCanvas");
      const ctx = tileCanvas.getContext("2d");
      const size = 512;
      tileCanvas.width = tileCanvas.height = size;

      ctx.fillStyle = "#b6e2f0";
      ctx.fillRect(0, 0, size, size);
      const tileW = 64;
      for (let i = 0; i <= size; i += tileW) {
        for (let j = 0; j <= size; j += tileW) {
          const isEven = ((i / tileW) + (j / tileW)) % 2 === 0;
          ctx.fillStyle = isEven ? "#6fb3cf" : "#4d8fb0";
          ctx.fillRect(i, j, tileW - 2, tileW - 2);
          ctx.strokeStyle = "rgba(255,255,240,0.75)";
          ctx.lineWidth = 2.5;
          ctx.strokeRect(i + 2, j + 2, tileW - 6, tileW - 6);
          ctx.fillStyle = "rgba(255,255,245,0.3)";
          ctx.fillRect(i + 12, j + 12, 8, 8);
        }
      }

      const waterCanvas = document.getElementById("waterCausticCanvas");
      const wctx = waterCanvas.getContext("2d");
      waterCanvas.width = waterCanvas.height = 512;
      const grad = wctx.createLinearGradient(0, 0, waterCanvas.width, waterCanvas.height);
      grad.addColorStop(0, "#00bfff");
      grad.addColorStop(1, "#87ceeb");
      wctx.fillStyle = grad;
      wctx.fillRect(0, 0, waterCanvas.width, waterCanvas.height);
      for (let i = 0; i < 380; i++) {
        wctx.beginPath();
        const x = Math.random() * waterCanvas.width;
        const y = Math.random() * waterCanvas.height;
        const rad = 8 + Math.random() * 36;
        wctx.fillStyle = `rgba(255, 255, 245, ${0.07 + Math.random() * 0.12})`;
        wctx.arc(x, y, rad, 0, Math.PI * 2);
        wctx.fill();
      }
      for (let s = 0; s < 40; s++) {
        wctx.beginPath();
        wctx.moveTo(0, s * 25);
        wctx.lineTo(512, s * 25 + Math.sin(s) * 18);
        wctx.strokeStyle = "rgba(255,250,210,0.2)";
        wctx.lineWidth = 2;
        wctx.stroke();
      }
    })();

    // ========== CUSTOM COMPONENTS ==========
    AFRAME.registerComponent("luxury-water", {
      schema: { baseY: { default: 0.22 }, speed: { default: 0.65 }, amplitude: { default: 0.022 } },
      init: function () { this.material = null; },
      tick: function (time) {
        if (!this.material) {
          const mesh = this.el.getObject3D("mesh");
          if (!mesh) return;
          this.material = mesh.material;
          if (this.material.map) {
            this.material.map.wrapS = THREE.RepeatWrapping;
            this.material.map.wrapT = THREE.RepeatWrapping;
            this.material.map.repeat.set(4, 2.8);
          }
        }
        const t = time * 0.001 * this.data.speed;
        this.el.object3D.position.y = this.data.baseY + Math.sin(t * 1.4) * this.data.amplitude;
        if (this.material) {
          this.material.opacity = 0.86 + Math.sin(t * 1.9) * 0.04;
          if (this.material.map) {
            this.material.map.offset.x = t * 0.03;
            this.material.map.offset.y = t * 0.02;
            this.material.map.needsUpdate = true;
          }
        }
      }
    });

    AFRAME.registerComponent("premium-float", {
      schema: { waterSurface: { default: 0.18 }, driftStrength: { default: 0.18 }, bobSpeed: { default: 1.0 } },
      init: function () { this.startX = this.el.object3D.position.x; this.startZ = this.el.object3D.position.z; },
      tick: function (time) {
        const body = this.el.body;
        if (!body) return;
        const t = time * 0.001 * this.data.bobSpeed;
        const targetSurface = this.data.waterSurface + Math.sin(t * 2.2) * 0.045;
        if (body.position.y < targetSurface) body.velocity.y += (targetSurface - body.position.y) * 0.48;
        const driftX = Math.sin(t * 0.62) * this.data.driftStrength;
        const driftZ = Math.cos(t * 0.71) * this.data.driftStrength * 0.7;
        body.velocity.x += (this.startX + driftX - body.position.x) * 0.045;
        body.velocity.z += (this.startZ + driftZ - body.position.z) * 0.045;
      }
    });

    AFRAME.registerComponent("pet-wander", {
      schema: { radius: { default: 3.2 }, speed: { default: 0.23 } },
      tick: function (time) {
        const t = time * 0.001 * this.data.speed;
        const x = 7.2 + Math.cos(t) * this.data.radius;
        const z = -2.5 + Math.sin(t * 1.18) * this.data.radius * 0.65;
        this.el.object3D.position.set(x, 0.12, z);
        this.el.object3D.rotation.y = -t * 1.2;
      }
    });

    AFRAME.registerComponent("pulse-glow", {
      schema: { min: { default: 0.85 }, max: { default: 1.12 }, speed: { default: 1.8 } },
      tick: function (time) {
        const s = this.data.min + ((Math.sin(time * 0.001 * this.data.speed) + 1) / 2) * (this.data.max - this.data.min);
        this.el.object3D.scale.set(s, s, s);
      }
    });

    AFRAME.registerComponent("water-motion", {
      schema: { speed: { default: 1.2 }, amplitude: { default: 0.08 } },
      init: function () {
        this.t = 0;
        this.positions = null;
        this.origPositions = null;
      },
      tick: function (time, delta) {
        const mesh = this.el.getObject3D("mesh");
        if (!mesh) return;
        const geo = mesh.geometry;
        if (!geo) return;
        if (!this.positions) {
          const pos = geo.attributes.position;
          this.origPositions = new Float32Array(pos.array);
          this.positions = pos;
        }
        const t = time * 0.001 * this.data.speed;
        const pos = this.positions;
        const orig = this.origPositions;
        for (let i = 0; i < pos.count; i++) {
          const ox = orig[i * 3];     // Local X
          const oy = orig[i * 3 + 1]; // Local Y

          // Modify local Z (index: i*3 + 2) which becomes vertical World Y when plane is rotated
          pos.array[i * 3 + 2] = Math.sin(ox * 1.8 + t) * this.data.amplitude
            + Math.sin(oy * 2.2 + t * 1.3) * this.data.amplitude * 0.6;
        }
        pos.needsUpdate = true;
        geo.computeVertexNormals();
        // gentle opacity pulse
        if (mesh.material) {
          mesh.material.opacity = 0.75 + Math.sin(t * 1.7) * 0.1;
        }
      }
    });

    AFRAME.registerComponent("gate-controller", {
      schema: {
        triggerDistance: { type: 'number', default: 15 } // Distance in meters to trigger opening
      },
      init: function () {
        this.isOpen = false;
        this.cameraEl = document.querySelector('[camera]');
      },
      tick: function () {
        if (!this.cameraEl) {
          this.cameraEl = document.querySelector('[camera]');
          if (!this.cameraEl) return;
        }

        // Get the absolute world position of the player's camera
        const cameraWorldPos = new THREE.Vector3();
        this.cameraEl.object3D.getWorldPosition(cameraWorldPos);

        // Calculate distance on the X-Z plane to the center of the driveway gate (X: 20, Z: -69.5)
        const dist = Math.sqrt(
          Math.pow(cameraWorldPos.x - 20, 2) +
          Math.pow(cameraWorldPos.z - (-69.5), 2)
        );

        // Open gate if player gets close
        if (dist < this.data.triggerDistance && !this.isOpen) {
          this.el.setAttribute("animation__slide", "property: position; to: 32 2.5 -69.5; dur: 2000; easing: easeInOutSine");
          this.isOpen = true;
        }
        // Close gate if player walks away
        else if (dist >= this.data.triggerDistance && this.isOpen) {
          this.el.setAttribute("animation__slide", "property: position; to: 20 2.5 -69.5; dur: 2000; easing: easeInOutSine");
          this.isOpen = false;
        }
      }
    });

    // Drone-style vertical flight controls
    AFRAME.registerComponent("vertical-controls", {
      schema: { speed: { type: "number", default: 0.15 } },
      init: function () {
        this.keys = {};
        window.addEventListener("keydown", (e) => { this.keys[e.key.toLowerCase()] = true; });
        window.addEventListener("keyup", (e) => { this.keys[e.key.toLowerCase()] = false; });
      },
      tick: function () {
        // Spacebar or 'E' to go UP
        if (this.keys["e"] || this.keys[" "]) {
          this.el.object3D.position.y += this.data.speed;
        }
        // Shift or 'Q' to go DOWN
        if (this.keys["q"] || this.keys["shift"]) {
          this.el.object3D.position.y -= this.data.speed;
        }
      }
    });
  </script>

      <a-plane position="-4.5 0.6 0.25" rotation="0 90 0" width="5.5" height="1.2"
        material="src: #pool-tile-tex; repeat: 11 2.4; roughness: 0.7; color: #fff"></a-plane>
      <a-plane position="4.5 0.6 0.25" rotation="0 -90 0" width="5.5" height="1.2"
        material="src: #pool-tile-tex; repeat: 11 2.4; roughness: 0.7; color: #fff"></a-plane>

      <!-- Pool Floor -->
      <a-plane position="0 0.05 0.25" rotation="-90 0 0" width="9" height="5.5"
        material="src: #pool-tile-tex; repeat: 18 11; roughness: 0.8; color: #fff"></a-plane>

      <!-- Pool Border Trim / Deck Edge -->
      <a-box position="0 1.25 -2.75" width="10.4" height="0.1" depth="0.5" color="#d1d1d1"
        material="roughness: 0.5"></a-box>
      <a-box position="0 1.25 3.25" width="10.4" height="0.1" depth="0.5" color="#d1d1d1"
        material="roughness: 0.5"></a-box>
      <a-box position="-4.75 1.25 0.25" width="0.5" height="0.1" depth="5.5" color="#d1d1d1"
        material="roughness: 0.5"></a-box>
      <a-box position="4.75 1.25 0.25" width="0.5" height="0.1" depth="5.5" color="#d1d1d1"
        material="roughness: 0.5"></a-box>

      <!-- Wooden Stairs leading up from Ground (Front side facing house) -->
      <a-entity id="pool-stairs" position="0 0 -3.4" shadow="cast: true; receive: true">
        <!-- Lower Step -->
        <a-box position="0 0.2 -0.8" width="4" height="0.2" depth="0.4" color="#6e503b"
          material="roughness: 0.8"></a-box>
        <!-- Middle Step -->
        <a-box position="0 0.4 -0.4" width="4" height="0.4" depth="0.4" color="#6e503b"
          material="roughness: 0.8"></a-box>
        <!-- Top Step -->
        <a-box position="0 0.6 0" width="4" height="0.6" depth="0.8" color="#6e503b" material="roughness: 0.8"></a-box>
      </a-entity>

      <!-- Animated Water Plane (Uses native A-Frame animations + vertex motion) -->
      <a-plane position="0 1.1 0.25" rotation="-90 0 0" width="8.9" height="5.3" segments-width="60"
        segments-height="40"
        material="color: skyblue; opacity: 0.85; transparent: true; metalness: 0.9; roughness: 0.1;" water-motion
        shadow="receive: true"
        animation="property: position; dir: alternate; to: 0 1.14 0.25; dur: 3500; loop: true; easing: easeInOutSine"></a-plane>

      <!-- Pool Ladder (Adjusted for elevation) -->
      <a-entity position="4.3 1.25 -1.5">
        <!-- Grab handles -->
        <a-torus position="-0.1 0.4 0" radius="0.3" radiusTubular="0.03" rotation="0 90 0" color="#fff"
          material="metalness: 0.9; roughness: 0.1"></a-torus>
        <a-torus position="-0.7 0.4 0" radius="0.3" radiusTubular="0.03" rotation="0 90 0" color="#fff"
          material="metalness: 0.9; roughness: 0.1"></a-torus>
        <!-- Support Legs on outer trim -->
        <a-cylinder position="-0.1 0 0.3" radius="0.03" height="0.1" color="#fff"
          material="metalness: 0.9; roughness: 0.1"></a-cylinder>
        <a-cylinder position="-0.7 0 0.3" radius="0.03" height="0.1" color="#fff"
          material="metalness: 0.9; roughness: 0.1"></a-cylinder>
        <!-- Legs descending into pool -->
        <a-cylinder position="-0.1 -0.4 -0.3" radius="0.03" height="1.6" color="#fff"
          material="metalness: 0.9; roughness: 0.1"></a-cylinder>
        <a-cylinder position="-0.7 -0.4 -0.3" radius="0.03" height="1.6" color="#fff"
          material="metalness: 0.9; roughness: 0.1"></a-cylinder>
        <!-- Steps inside -->
        <a-cylinder position="-0.4 0.1 -0.3" radius="0.02" height="0.6" rotation="0 0 90" color="#fff"></a-cylinder>
        <a-cylinder position="-0.4 -0.3 -0.3" radius="0.02" height="0.6" rotation="0 0 90" color="#fff"></a-cylinder>
        <a-cylinder position="-0.4 -0.7 -0.3" radius="0.02" height="0.6" rotation="0 0 90" color="#fff"></a-cylinder>
        <a-cylinder position="-0.4 -1.1 -0.3" radius="0.02" height="0.6" rotation="0 0 90" color="#fff"></a-cylinder>
      </a-entity>

      <!-- Pool Accessories & Lights -->
      <a-torus position="2.5 1.15 0" radius="0.6" radiusTubular="0.2" color="#ff4d4d" rotation="90 0 20"
        material="roughness: 0.2" shadow="cast: true"></a-torus>

      <!-- Underwater lights -->
      <a-sphere position="-3.5 0.5 1" radius="0.1"
        material="color: #fff; emissive: skyblue; emissiveIntensity: 2; transparent: true; opacity: 0.9"></a-sphere>
      <a-entity light="type: point; color: skyblue; intensity: 1.2; distance: 7" position="-3.5 0.5 1"></a-entity>
      <a-sphere position="3.5 0.5 -1" radius="0.1"
        material="color: #fff; emissive: skyblue; emissiveIntensity: 2; transparent: true; opacity: 0.9"></a-sphere>
      <a-entity light="type: point; color: skyblue; intensity: 1.2; distance: 7" position="3.5 0.5 -1"></a-entity>
    </a-entity>




    <!-- ========== FOOTBALL COURT ========== -->
    <a-entity gltf-model="#footballCourtModel" position="-24 0.05 -7" rotation="0 90 0" scale="0.8 0.8 0.8"
      shadow="cast: true; receive: true"></a-entity>



    <!-- Modern car (Toyota) -->
    <a-entity gltf-model="#toyotaModel" position="15 0.02 -32" rotation="0 -160 0" scale="0.8 0.8 0.8"
      shadow="cast: true"></a-entity>

    <a-entity id="cybertruck" gltf-model="#cybertruckModel" position="20 1.2 -30" rotation="0 155 0"
      scale="14.8 14.8 14.8" shadow="cast: true; receive: true">
    </a-entity>

    <!-- Spotlight on the Cybertruck -->
    <a-entity
      light="type: spot; color: #fff5d6; intensity: 1.8; distance: 12; angle: 40; penumbra: 0.3; castShadow: true"
      position="3.0 5.5 4.5" rotation="-80 0 0"></a-entity>

    <!-- Decorative outdoor lamps -->
    <a-entity position="-7.8 0.2 5.0">
      <a-cylinder radius="0.12" height="1.6" color="#d4cfbc"></a-cylinder>
      <a-sphere radius="0.22" color="#ffdd99" position="0 1.45 0"
        light="type: point; intensity: 0.35; color: #f9e0a0; distance: 7"></a-sphere>
    </a-entity>
    <a-entity position="9.2 0.2 4.2">
      <a-cylinder radius="0.12" height="1.6" color="#d4cfbc"></a-cylinder>
      <a-sphere radius="0.22" color="#ffdd99" position="0 1.45 0"
        light="type: point; intensity: 0.35; color: #ffd28c"></a-sphere>
    </a-entity>

    <!-- Atmospheric particles -->
    <a-entity
      particle-system="preset: dust; particleCount: 180; color: #ffeda3; size: 0.08; velocity: 0.1 0.05 0.1; opacity: 0.4;"
      position="0 2 -6"></a-entity>

    <!-- ========== VR RIG ========== -->
    <a-entity id="rig" position="0 4 6.5" movement-controls="speed: 0.35; constrainToNavMesh: false; fly: true"
      vertical-controls>
      <a-entity camera look-controls="pointerLockEnabled: true" wasd-controls="acceleration: 50; fly: true"></a-entity>
      <a-entity laser-controls="hand: left"></a-entity>
      <a-entity laser-controls="hand: right"></a-entity>
    </a-entity>

    <!-- Floating labels -->
    <a-entity position="0 2.8 4.0"><a-text value="✨ VILLA LOBBY" color="#f0f9ff" align="center" width="5"
        font="kelsonsans"></a-text><a-ring position="0 -0.55 0" rotation="-90 0 0" radius-inner="0.18"
        radius-outer="0.28" color="#ffd966" pulse-glow></a-ring></a-entity>

  </a-scene>
</body>

</html>
